name: Playwright Tests and Allure Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-and-build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify exact test count
        run: |
          npx playwright test --list --reporter=line | grep -Eq '^Total: 461 tests in [0-9]+ files$'

      - name: Run Playwright tests
        id: tests
        continue-on-error: true
        run: npm test

      - name: Generate Allure HTML report
        if: always()
        run: npm run allure:generate

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Allure report as Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Preserve Playwright test failure
        if: steps.tests.outcome == 'failure'
        run: exit 1

  deploy:
    if: always()
    needs: test-and-build-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
